<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinClipboard Vault</title>
    <!-- Add query strings to bypass WebView2 cache -->
    <link rel="stylesheet" href="styles.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Layer 1: Background Image -->
    <div id="bg-layer"></div>

    <!-- Layer 2: Frosted Glass Overlay -->
    <div id="overlay-layer"></div>

    <!-- Layer 3: Content -->
    <div id="content-layer">

        <!-- Top Navigation: Segmented Control -->
        <div id="nav-bar">
            <div id="segmented-control">
                <div id="segment-slider"></div>
                <button class="segment active" data-tab="history" onclick="switchTab('history')">历史</button>
                <button class="segment" data-tab="favorites" onclick="switchTab('favorites')">收藏</button>
            </div>
            <div id="nav-actions">
                <button class="icon-btn" id="btn-settings" onclick="toggleSettings()" title="设置">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                </button>
                <button class="icon-btn" id="btn-vault" onclick="toggleVault()" title="保险箱">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                </button>
                <button class="icon-btn" id="btn-clear" onclick="clearHistory()" title="清空历史">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Search Bar -->
        <div id="search-bar">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="search-input" placeholder="搜索...  /img /file 过滤类型" autocomplete="off">
        </div>

        <!-- Main List -->
        <div id="list-container">
            <div id="item-list"></div>
            <div id="empty-hint" class="hidden">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                    opacity="0.3">
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                </svg>
                <span>暂无记录</span>
            </div>
        </div>

        <!-- Settings Panel (hidden by default) -->
        <div id="settings-panel" class="panel hidden">
            <div class="panel-header">
                <button class="icon-btn" onclick="toggleSettings()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12" />
                        <polyline points="12 19 5 12 12 5" />
                    </svg>
                </button>
                <h3>设置</h3>
            </div>
            <div class="panel-body">
                <div class="setting-group">
                    <h4>外观</h4>
                    <div class="setting-row">
                        <span>主题</span>
                        <select id="theme-select" onchange="changeTheme(this.value)">
                            <option value="light">浅色</option>
                            <option value="dark">深色</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <span>背景图片</span>
                        <div class="setting-actions">
                            <button class="small-btn" onclick="pickBackground()">选择</button>
                            <button class="small-btn" onclick="clearBackground()">清除</button>
                        </div>
                    </div>
                </div>
                <div class="setting-group">
                    <h4>系统</h4>
                    <div class="setting-row">
                        <span>开机自启</span>
                        <label class="toggle"><input type="checkbox" id="autostart-toggle"><span
                                class="toggle-slider"></span></label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vault Panel (hidden by default) -->
        <div id="vault-panel" class="panel hidden">
            <div class="panel-header">
                <button class="icon-btn" onclick="toggleVault()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12" />
                        <polyline points="12 19 5 12 12 5" />
                    </svg>
                </button>
                <h3>🔐 保险箱</h3>
                <button class="small-btn" style="margin-left:auto" onclick="addSecret()">+ 添加</button>
            </div>
            <div class="panel-body">
                <input type="text" id="vault-search" placeholder="搜索别名..." oninput="searchVault(this.value)">
                <div id="vault-list"></div>
            </div>
        </div>

        <!-- Preview Modal -->
        <div id="preview-modal" class="hidden" onclick="closePreview()">
            <div id="preview-content" onclick="event.stopPropagation()"></div>
        </div>
    </div>

    <!-- Vault Add Modal -->
    <div id="vault-add-modal" class="hidden">
        <div class="confirm-box" style="width: 360px">
            <h3 style="margin-top:0; margin-bottom: 16px">添加记录</h3>
            <div class="setting-row" style="margin-bottom: 8px">
                <span style="min-width: 50px">名称</span>
                <input type="text" id="vault-add-alias" placeholder="例如：我的服务器、GitHub"
                    style="width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--search-border); background: var(--search-bg); color: var(--text-primary)">
            </div>
            <div class="setting-row" style="margin-bottom: 8px">
                <span style="min-width: 50px">账号</span>
                <input type="text" id="vault-add-username" placeholder="(可选) root、邮箱等"
                    style="width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--search-border); background: var(--search-bg); color: var(--text-primary)">
            </div>
            <div class="setting-row" style="margin-bottom: 8px">
                <span style="min-width: 50px">密码</span>
                <input type="password" id="vault-add-password" placeholder="密码/密钥内容"
                    style="width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--search-border); background: var(--search-bg); color: var(--text-primary)">
            </div>
            <div class="setting-row" style="margin-bottom: 20px">
                <span style="min-width: 50px">备注</span>
                <textarea id="vault-add-remark" placeholder="(可选) 域名、端口等附加信息" rows="2"
                    style="width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--search-border); background: var(--search-bg); color: var(--text-primary); resize: none; font-family: inherit; font-size: inherit;"></textarea>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:10px">
                <button id="vault-add-cancel" class="small-btn" onclick="closeVaultAddModal()">取消</button>
                <button id="vault-add-ok" class="small-btn primary" onclick="submitVaultAdd()">保存</button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="hidden">
        <div class="confirm-box">
            <h3 style="margin-top:0">提示</h3>
            <p id="confirm-message" style="margin-bottom:20px; color:var(--text-secondary)"></p>
            <div style="display:flex; justify-content:flex-end; gap:10px">
                <button id="confirm-cancel" class="small-btn">取消</button>
                <button id="confirm-ok" class="small-btn danger">确定</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=2"></script>
</body>

</html>
